<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#1A2332"/>
  <!-- Orange hexagon -->
  <polygon points="32,5 56,18.5 56,45.5 32,59 8,45.5 8,18.5" fill="#E0621A"/>
  <!-- Wrench shape -->
  <g fill="white">
    <!-- Handle -->
    <rect x="29" y="26" width="6" height="20" rx="3"/>
    <!-- Head circle -->
    <circle cx="32" cy="22" r="8" fill="#E0621A"/>
    <circle cx="32" cy="22" r="5" fill="white"/>
    <!-- Wrench gap -->
    <rect x="29.5" y="17" width="5" height="5" fill="#E0621A"/>
    <!-- Top fork left -->
    <rect x="26" y="14" width="4" height="8" rx="2"/>
    <!-- Top fork right -->
    <rect x="34" y="14" width="4" height="8" rx="2"/>
  </g>
</svg>
